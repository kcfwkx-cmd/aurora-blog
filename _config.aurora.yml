#! ---------------------------------------------------------------
#! Aurora 主题配置 (在博客根目录修改，勿改 node_modules)
#! 文档 https://aurora.tridiamond.tech/guide/configuration.html
#! ---------------------------------------------------------------

#! ---------------------------------------------------------------
#! 站点信息
#! ---------------------------------------------------------------
site:
  subtitle: REXO
  author: REXO          # 与 _config.yml 的 author 对应
  nick: 我是王大头
  description: '有用有趣，长期服务'
  link: '/'
  language: zh-CN           # 可选 en / zh-CN 等
  multi_language: true
  logo:
  avatar: /images/head.jpg
  beian:
    number: ''
    link: ''
  police_beian:
    number: ''
    link: ''
  # 博客开始日期 YYYY-MM-DD
  started_date:
  # 文章 URL：uid=唯一ID，slug=基于标题 (默认 slug)
  pathSlug: 'slug'

#! ---------------------------------------------------------------
#! 多作者（可选）
#! ---------------------------------------------------------------
authors:
  # 示例:
  # myname:
  #   name: 显示名
  #   avatar: 头像URL
  #   link: 个人链接
  #   description: 简介
  #   socials:
  #     github: https://github.com/xxx

#! ---------------------------------------------------------------
#! 导航菜单
#! ---------------------------------------------------------------
menu:
  about:
    name: '我是谁'
    path: '/about'
    i18n:
      zh-CN: '我是谁'
      en: 'About Me'
  services:
    name: '提供的服务'
    path: '/services'
    i18n:
      zh-CN: '提供的服务'
      en: 'Services'
  random:
    name: '随机看一篇'
    path: '/random'
    i18n:
      zh-CN: '随机看一篇'
      en: 'Random'

#! ---------------------------------------------------------------
#! 主题外观
#! ---------------------------------------------------------------
theme:
  dark_mode: true
  profile_shape: rounded   # circle | diamond | rounded
  feature: true            # 是否显示精选/置顶
  gradient:
    color_1: '#ff416c'
    color_2: '#ff4b2b'
    color_3: '#f9d423'
    # 备选配色方案：
    # 春_spring:   color_1: '#f953c6'  color_2: '#b91d73'  color_3: '#43e97b'
    # 夏_summer:   color_1: '#4facfe'  color_2: '#00f2fe'  color_3: '#43e97b'
    # 秋_autumn:   color_1: '#f7971e'  color_2: '#e52d27'  color_3: '#ffd200'
    # 冬_winter:   color_1: '#a1c4fd'  color_2: '#667eea'  color_3: '#c2e9fb'
    # 赛博霓虹:    color_1: '#7f00ff'  color_2: '#00ffcc'  color_3: '#ff0080'

#! ---------------------------------------------------------------
#! 社交链接（可选）
#! ---------------------------------------------------------------
socials:
  customs: {}
  # 示例:
  # customs:
  #   bilibili:
  #     icon: far fa-address-book
  #     link: https://www.bilibili.com

#! ---------------------------------------------------------------
#! 站点 Meta（必填，否则会报错）
#! ---------------------------------------------------------------
site_meta:
  cdn: cn                   # cn | 其他，用于 CDN/静态资源
  favicon:
  description: ''
  keywords: ''
  author: ''

#! ---------------------------------------------------------------
#! 评论插件（按需开启其一）
#! ---------------------------------------------------------------
gitalk:
  enable: false
  autoExpand: true
  clientID: ''
  clientSecret: ''
  repo: ''
  owner: ''
  admin: ['']
  id: uid
  language: zh-CN
  distractionFreeMode: true
  recentComment: true
  proxy: ''

valine:
  enable: false
  app_id: ''
  app_key: ''
  avatar: ''
  placeholder: 留下你的想法~
  visitor: true
  lang: zh-CN
  avatarForce: false
  meta: ['nick', 'mail']
  requiredFields: ['nick', 'mail']
  admin: ''
  recentComment: true

twikoo:
  enable: false
  recentComment: true
  envId: ''
  lang: 'zh-CN'

waline:
  enable: false
  recentComment: true
  reaction: false
  login: 'disable'
  meta: ['nick', 'mail']
  requiredMeta: ['nick', 'mail']
  commentSorting: 'latest'
  wordLimit: 0
  imageUploader: false
  pageSize: 10
  serverURL: ''

#! ---------------------------------------------------------------
#! 其他
#! ---------------------------------------------------------------
busuanzi:
  enable: false

copy_protection:
  enable: true
  author:
    cn: 作者
    en: Author
  link:
    cn: 本文来自于
    en: Article is from
  license:
    cn: 博客内容遵循 署名-非商业性使用-相同方式共享 4.0 国际 (CC BY-NC-SA 4.0) 协议
    en: This content is shared under the CC BY-NC-SA 4.0 protocol (Non-Commercial)

aurora_bot:
  enable: false
  locale: zh-CN
  bot_type: dia
  tips: []

injects:
  scripts: []
  css:
    - >-
      <style>
      body#body-container.theme-dark{background:#1a1a1a!important;}
      .article-thumbnail,.feature-thumbnail{background-image:url('/images/default_cover.png')!important;background-size:cover!important;background-position:center!important;}
      .article-thumbnail img[src*="dccf965f"],.feature-thumbnail img[src*="dccf965f"]{opacity:0!important;}
      .thumbnail-screen{opacity:0!important;}
      .app-banner-image{opacity:0!important;}
      .app-banner-screen{opacity:1!important;}
      .light .feature-article .feature-thumbnail::after,.light .article .article-thumbnail::after,.light .article-thumbnail::after,.light .feature-thumbnail::after{opacity:0!important;}
      .text-invert.font-extrabold.text-white{font-size:0.6rem!important;}
      .text-invert.text-xl.font-extrabold{font-size:1.5rem!important;}
      .App-Mobile-sidebar li > div > span + span{display:none!important;}
      </style>

footer_links: []
# 示例:
# footer_links:
#   - title: 友链
#     links:
#       - title: 某站
#         url: https://example.com
#       - title: Friends
#         mode: 'links'

#! ---------------------------------------------------------------
#! 代码高亮 Shiki
#! ---------------------------------------------------------------
shiki:
  enable: true
  backgroundColor: "#1a1a1a"
