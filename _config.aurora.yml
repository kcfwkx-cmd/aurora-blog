#! ---------------------------------------------------------------
#! Aurora 主题配置 (在博客根目录修改，勿改 node_modules)
#! 文档 https://aurora.tridiamond.tech/guide/configuration.html
#! ---------------------------------------------------------------

#! ---------------------------------------------------------------
#! 站点信息
#! ---------------------------------------------------------------
site:
  subtitle: REXO
  author: REXO          # 与 _config.yml 的 author 对应
  nick: 我是王大头
  description: '有用有趣，长期服务'
  link: '/'
  language: zh-CN           # 可选 en / zh-CN 等
  multi_language: true
  logo: 
  avatar: /images/head.jpg
  beian:
    number: ''
    link: ''
  police_beian:
    number: ''
    link: ''
  # 博客开始日期 YYYY-MM-DD
  started_date:
  # 文章 URL：uid=唯一ID，slug=基于标题 (默认 slug)
  pathSlug: 'slug'

#! ---------------------------------------------------------------
#! 多作者（可选）
#! ---------------------------------------------------------------
authors:
  # 示例:
  # myname:
  #   name: 显示名
  #   avatar: 头像URL
  #   link: 个人链接
  #   description: 简介
  #   socials:
  #     github: https://github.com/xxx

#! ---------------------------------------------------------------
#! 导航菜单
#! ---------------------------------------------------------------
menu:
  about:
    name: '我是谁'
    path: '/about'
    i18n:
      zh-CN: '我是谁'
      en: 'About Me'
  services:
    name: '提供的服务'
    path: '/page/services'
    i18n:
      zh-CN: '提供的服务'
      en: 'Services'

#! ---------------------------------------------------------------
#! 主题外观
#! ---------------------------------------------------------------
theme:
  dark_mode: true
  profile_shape: rounded   # circle | diamond | rounded
  feature: true            # 是否显示精选/置顶
  gradient:
    color_1: '#ff416c'
    color_2: '#ff4b2b'
    color_3: '#f9d423'
    # 备选配色方案：
    # 春_spring:   color_1: '#f953c6'  color_2: '#b91d73'  color_3: '#43e97b'
    # 夏_summer:   color_1: '#4facfe'  color_2: '#00f2fe'  color_3: '#43e97b'
    # 秋_autumn:   color_1: '#f7971e'  color_2: '#e52d27'  color_3: '#ffd200'
    # 冬_winter:   color_1: '#a1c4fd'  color_2: '#667eea'  color_3: '#c2e9fb'
    # 赛博霓虹:    color_1: '#7f00ff'  color_2: '#00ffcc'  color_3: '#ff0080'

#! ---------------------------------------------------------------
#! 社交链接（可选）
#! ---------------------------------------------------------------
socials:
  customs: {}
  # 示例:
  # customs:
  #   bilibili:
  #     icon: far fa-address-book
  #     link: https://www.bilibili.com

#! ---------------------------------------------------------------
#! 站点 Meta（必填，否则会报错）
#! ---------------------------------------------------------------
site_meta:
  cdn: cn                   # cn | 其他，用于 CDN/静态资源
  favicon: /images/logo-1.png
  description: ''
  keywords: ''
  author: ''

#! ---------------------------------------------------------------
#! 评论插件（按需开启其一）
#! ---------------------------------------------------------------
gitalk:
  enable: false
  autoExpand: true
  clientID: ''
  clientSecret: ''
  repo: ''
  owner: ''
  admin: ['']
  id: uid
  language: zh-CN
  distractionFreeMode: true
  recentComment: true
  proxy: ''

valine:
  enable: false
  app_id: ''
  app_key: ''
  avatar: ''
  placeholder: 留下你的想法~
  visitor: true
  lang: zh-CN
  avatarForce: false
  meta: ['nick', 'mail']
  requiredFields: ['nick', 'mail']
  admin: ''
  recentComment: true

twikoo:
  enable: false
  recentComment: true
  envId: ''
  lang: 'zh-CN'

waline:
  enable: false
  recentComment: true
  reaction: false
  login: 'disable'
  meta: ['nick', 'mail']
  requiredMeta: ['nick', 'mail']
  commentSorting: 'latest'
  wordLimit: 0
  imageUploader: false
  pageSize: 10
  serverURL: ''

#! ---------------------------------------------------------------
#! 其他
#! ---------------------------------------------------------------
busuanzi:
  enable: false

copy_protection:
  enable: true
  author:
    cn: 作者
    en: Author
  link:
    cn: 本文来自于
    en: Article is from
  license:
    cn: 博客内容遵循 署名-非商业性使用-相同方式共享 4.0 国际 (CC BY-NC-SA 4.0) 协议
    en: This content is shared under the CC BY-NC-SA 4.0 protocol (Non-Commercial)

aurora_bot:
  enable: false
  locale: zh-CN
  bot_type: dia
  tips: []

injects:
  scripts:
    - >-
      <script>
      (function(){
        function goRandom(){
          fetch('/api/search.json')
            .then(function(r){return r.json();})
            .then(function(posts){
              if(posts&&posts.length>0){
                var post=posts[Math.floor(Math.random()*posts.length)];
                var app=document.querySelector('#app');
                var router=app&&app.__vue_app__&&app.__vue_app__.config.globalProperties.$router;
                if(router) router.push('/post/'+post.slug);
              }
            });
        }
        function tryInsertBtn(){
          var p=window.location.pathname;
          if(p!=='/'&&p!=='/index.html') return;
          if(document.getElementById('ob-random-btn')) return;
          var plate=document.querySelector('.ob-gradient-plate');
          if(!plate) return;
          var card=plate.parentElement;
          var btn=document.createElement('div');
          btn.id='ob-random-btn';
          btn.style.cssText='position:absolute;bottom:36px;left:27px;display:inline-flex;align-items:center;gap:8px;padding:6px 16px;border-radius:9999px;background:rgba(0,0,0,0.45);cursor:pointer;transition:opacity .15s;z-index:20;white-space:nowrap;';
          btn.innerHTML='<svg style="height:18px;width:18px;flex-shrink:0;" viewBox="0 0 640 640" xmlns="http://www.w3.org/2000/svg"><defs><linearGradient id="rg2" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#ff416c"/><stop offset="50%" stop-color="#ff4b2b"/><stop offset="100%" stop-color="#f9d423"/></linearGradient></defs><path fill="url(#rg2)" d="M560 128C573.2 128 580.7 143.1 572.8 153.6L544 192L544 368C544 447.5 479.5 512 400 512L288 512L241.7 558.3C231.3 568.7 215.2 570.7 202.6 563.1L105.5 504.9C88.5 494.7 90.5 469.4 108.9 462L224 416C87.8 375.1 71.5 233.8 86 159.7C89.6 141.9 109.3 135.4 125.3 144.2L384 288L384 208C384 163.8 419.8 128 464 128L560 128zM464 184C450.7 184 440 194.7 440 208C440 221.3 450.7 232 464 232C477.3 232 488 221.3 488 208C488 194.7 477.3 184 464 184zM246.5 54.4C258.9 40.7 279.8 45.5 289 61.5L345.4 159.8C339.6 174.2 336.2 189.9 336 206.3L202.1 132C212.2 100.4 229.1 73.6 246.5 54.4z"/></svg>'
            +'<span style="font-size:13px;font-weight:700;letter-spacing:.03em;background:linear-gradient(130deg,#ff416c,#ff4b2b 41%,#f9d423 76%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;">随便看一篇</span>';
          btn.onmouseover=function(){this.style.opacity='.75';};
          btn.onmouseout=function(){this.style.opacity='1';};
          btn.addEventListener('click',goRandom);
          card.appendChild(btn);
        }
        setInterval(tryInsertBtn,400);
      })();
      </script>
    - >-
      <script>
      (function(){
        function fixTitle(){
          var t=document.title;
          if(!t) return;
          var sep=t.indexOf(' | ');
          if(sep===-1) return;
          var left=t.slice(0,sep);
          var right=t.slice(sep+3);
          if(left===right) document.title=left;
        }
        var obs=new MutationObserver(fixTitle);
        obs.observe(document.head,{childList:true,subtree:true,characterData:true});
        fixTitle();
      })();
      </script>
  css:
    - >-
      <style>
      body#body-container.theme-dark{background:#1a1a1a!important;}
      .article-thumbnail,.feature-thumbnail{background-color:#2a2a2a!important;}
      .article-thumbnail:has(img[src*="dccf965f"]),.feature-thumbnail:has(img[src*="dccf965f"]){background-image:url('/images/default_cover.png')!important;background-size:cover!important;background-position:center!important;}
      .article-thumbnail img[src*="dccf965f"],.feature-thumbnail img[src*="dccf965f"]{opacity:0!important;}
      .thumbnail-screen{opacity:0!important;}
      .app-banner-image{opacity:0!important;}
      .app-banner-screen{opacity:1!important;}
      .light .feature-article .feature-thumbnail::after,.light .article .article-thumbnail::after,.light .article-thumbnail::after,.light .feature-thumbnail::after{opacity:0!important;}
      .text-invert.font-extrabold.text-white{font-size:0.6rem!important;}
      .text-invert.text-xl.font-extrabold{font-size:1.5rem!important;}
      .App-Mobile-sidebar li > div > span + span{display:none!important;}
      </style>

footer_links: []
